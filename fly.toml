# Fly.io deployment config for PromptArena.
#
# Low-cost setup: a SINGLE small machine with a persistent volume that holds the
# SQLite database. Migrations run automatically on startup via
# docker-entrypoint.sh (`prisma migrate deploy`).
#
# IMPORTANT: keep exactly one machine. SQLite cannot be shared across machines —
# do not scale horizontally without first migrating to Postgres (see DEPLOYMENT.md).
#
# First-time setup:
#   fly launch --no-deploy --copy-config --name <your-app>
#   fly volumes create data --size 1 --region fra
#   fly secrets set ADMIN_SECRET=... USER_SECRET=... EMAIL_SECRET=...
# Deploys thereafter run from CI (.github/workflows/deploy.yml) on a published release.

app = 'prompt-arena'
primary_region = 'fra'   # Frankfurt — pick the region closest to your users

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_URL = 'file:/data/prod.db'   # SQLite on the mounted volume (survives redeploys)
  LOG_LEVEL = 'info'
  NODE_ENV = 'production'
  PORT = '3000'

# Persistent volume — mounted at /data (matches DATABASE_URL above).
[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'   # scale to zero when idle → lower cost
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  # Health check drives auto-restart and zero-downtime deploys.
  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'   # plenty for this app; bump to 512mb if builds/seed need it
