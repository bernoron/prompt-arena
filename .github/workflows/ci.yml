name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-security:
    name: Dependency Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Block high/critical production dependency advisories
        run: npm run security:deps

      - name: Review dependency changes on pull requests
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0, LGPL-3.0

  # ── Unit Tests ───────────────────────────────────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  # ── E2E Tests ────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations + seed
        run: npm run db:reset:dev
        env:
          # file:./dev.db → resolved relative to prisma/ → prisma/dev.db
          DATABASE_URL: file:./dev.db
          NODE_ENV: development

      - name: Build Next.js for production (deterministic, no JIT)
        run: npm run build
        env:
          DATABASE_URL: file:./dev.db
          ADMIN_SECRET: ci-admin-secret
          USER_SECRET: ci-user-secret-with-at-least-32-chars
          EMAIL_SECRET: ci-email-secret-for-testing-32chars!!
          NODE_ENV: production

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: file:./dev.db
          ADMIN_SECRET: ci-admin-secret
          USER_SECRET: ci-user-secret-with-at-least-32-chars
          EMAIL_SECRET: ci-email-secret-for-testing-32chars!!
          NODE_ENV: production
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7

  # ── Type Check + Lint ────────────────────────────────────────────────────────
  lint:
    name: Type Check + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  # ── Deploy to Fly.io ─────────────────────────────────────────────────────────
  # Runs only after every check above has passed, and only for a push to main
  # (never for pull_request events) — that keeps FLY_API_TOKEN unreachable from
  # forked/unreviewed branches, since pull_request workflows never get secrets
  # from the base repo's "production" environment.
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [dependency-security, unit, e2e, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    concurrency:
      group: fly-deploy-production
      cancel-in-progress: false
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly CLI
        # Pinned to the commit behind tag 1.6 (not the mutable tag itself) so a
        # future re-tag of this third-party action can't silently swap in
        # different code for a job that holds a production deploy token.
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
