name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Unit Tests ───────────────────────────────────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prompt-arena
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: prompt-arena/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  # ── E2E Tests ────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prompt-arena
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: prompt-arena/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations + seed
        run: npm run db:reset:dev
        env:
          DATABASE_URL: file:./prisma/dev.db
          NODE_ENV: development

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build Next.js app
        run: npm run build
        env:
          DATABASE_URL: file:./prisma/dev.db
          ADMIN_SECRET: ci-test-secret

      - name: Start server + run E2E tests
        run: |
          npm run start &
          npx wait-on http://localhost:3000/api/health --timeout 30000
          npm run test:e2e
        env:
          DATABASE_URL: file:./prisma/dev.db
          ADMIN_SECRET: ci-test-secret
          NODE_ENV: production
          PORT: 3000

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: prompt-arena/tests/playwright-report/
          retention-days: 7

  # ── Type Check + Lint ────────────────────────────────────────────────────────
  lint:
    name: Type Check + Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prompt-arena
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: prompt-arena/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint
