version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Zurich
    open-pull-requests-limit: 5
    groups:
      nextjs:
        patterns:
          - next
          - eslint-config-next
      prisma:
        patterns:
          - prisma
          - "@prisma/client"
      react:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Zurich
    open-pull-requests-limit: 3
